# Nav2 Parameters for Real Robot — RTAB-Map localization mode, DWB controller
# Clone of nav2_params_real.yaml (known-working DWB config) with the obstacle
# source swapped from /scan → /camera/depth/points because rtabmap mode doesn't
# publish a fake laser scan.
# Activate with: LOCALIZATION_MODE=rtabmap CONTROLLER=dwb ros2 launch fyp_bringup bringup_nav.launch.py mode:=nav

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 60           # was 20 — smooth_path was timing out before acknowledge
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    transform_tolerance: 1.0             # tolerate stale goal timestamps during warm-up
    default_nav_to_pose_bt_xml: /home/muhammad/fyp_ws/src/fyp_nav2/behavior_trees/navigate_to_pose_w_smoothing.xml
    default_nav_through_poses_bt_xml: /home/muhammad/fyp_ws/src/fyp_nav2/behavior_trees/navigate_to_pose_w_smoothing.xml
    navigators: ["navigate_to_pose"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_rate_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_smooth_path_action_bt_node

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0           # was 20.0 — DWB couldn't keep up at 20Hz (see "Control loop missed its desired rate"); halving gives each tick twice the CPU budget
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0               # was 0.3; S-curve ramp means robot moves slowly at start — avoid false "stuck" reports that trigger Spin recovery
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05     # was 0.1; lower bar tolerates slow S-curve ramp-up
      movement_time_allowance: 20.0      # was 10.0; gives more time during gentle ramp

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: True
      xy_goal_tolerance: 0.40
      yaw_goal_tolerance: 0.20

    # ===========================================================================
    # SEQUENTIAL "rotate → drive → rotate" navigation pattern
    # ===========================================================================
    # Goal: at the start of every motion the robot rotates in place toward the
    # next waypoint, then drives straight, then rotates to final goal heading.
    # No continuous blending of rotation and translation.
    #
    # Achieved by:
    #  1. Rotation shim with low threshold (10°) → almost always rotates first
    #     before letting DWB drive forward. Practically: any non-trivial heading
    #     error triggers in-place alignment.
    #  2. DWB critics tuned so PathDist (lateral path tracking) >> PathAlign
    #     (heading tracking) → once aligned, robot stays on path without
    #     re-aligning every tick.
    #  3. RotateToGoal critic with strong scale → at goal arrival, drives ω,
    #     not v, until yaw is correct.
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "dwb_core::DWBLocalPlanner"
      # Shim fires whenever heading error > 20° — ensures robot always pre-aligns
      # before driving. Low enough to catch mid-path re-alignment needs,
      # high enough to not interrupt gentle curves.
      angular_dist_threshold: 0.5      # ~29° — rotate first before any forward motion (increased)
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 0.20  # gentle rotation speed — smooth, not snappy
      max_angular_accel: 0.08           # matches firmware MAX_ANGULAR_ACCEL exactly
      simulate_ahead_time: 1.0
      rotate_to_heading_min_angle: 0.05  # ~3° — exit shim only when very well aligned
      # --- DWB (primary) params below ---
      debug_trajectory_details: True
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.18
      max_vel_y: 0.0
      max_vel_theta: 0.25              # cap rotation speed — matches firmware gentle accel
      min_speed_xy: 0.0
      max_speed_xy: 0.18
      min_speed_theta: 0.0
      acc_lim_x: 0.15                  # matches firmware MAX_LINEAR_ACCEL
      acc_lim_y: 0.0
      acc_lim_theta: 0.08              # matches firmware MAX_ANGULAR_ACCEL
      decel_lim_x: -0.20              # matches firmware MAX_LINEAR_DECEL
      decel_lim_y: 0.0
      decel_lim_theta: -0.15          # matches firmware MAX_ANGULAR_DECEL
      vx_samples: 20
      vy_samples: 0
      vtheta_samples: 25
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.40
      trans_stopped_velocity: 0.02
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "ObstacleFootprint", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 15.0
      ObstacleFootprint.scale: 5.0
      # PathDist dominates to keep robot on centerline during drive phase.
      # PathAlign kept low — shim already pre-aligned so DWB doesn't need to
      # constantly steer heading during straight drive.
      PathAlign.scale: 6.0
      PathAlign.forward_point_distance: 0.3
      PathDist.scale: 30.0  # slightly reduced for less strict path centering
      GoalDist.scale: 24.0
      # RotateToGoal: very strong scale + high slowing_factor so the robot
      # comes to a full stop, then rotates cleanly to final goal yaw.
      # slowing_factor=5 means it decelerates to near-zero before rotating.
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 3.0
      RotateToGoal.lookahead_time: -1.0
      Oscillation.scale: 5.0
      Oscillation.oscillation_reset_dist: 0.15
      Oscillation.oscillation_reset_angle: 0.3

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    transform_tolerance: 1.0             # tolerate stale goal timestamps during warm-up
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    # Longer action timeout so BT's smooth_path call doesn't hit its own deadline
    # while the smoother is iterating (was defaulting, causing "Timed out while
    # waiting for action server to acknowledge goal request for smooth_path").
    action_server_result_timeout: 30.0
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-4                  # looser tolerance → converges in fewer iterations
      max_its: 200                       # was 1000 — finish fast, accept slightly less-smooth path
      do_refinement: true
      refinement_num: 2

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    # aligned with firmware S-curve limits so Spin/BackUp recoveries don't
    # command faster than the ESP32 can actually ramp
    max_rotational_vel: 0.20
    min_rotational_vel: 0.05
    rotational_acc_lim: 0.08      # matches firmware MAX_ANGULAR_ACCEL

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.18, 0.0, 0.25]
    min_velocity: [-0.18, 0.0, -0.25]
    # Smoother runs as near-passthrough — firmware S-curve owns actual ramping.
    # Tight accel here causes double-ramping and adds seconds of startup latency.
    max_accel: [1.0, 0.0, 1.5]
    max_decel: [-1.0, 0.0, -1.5]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.01, 0.0, 0.02]
    velocity_timeout: 1.0

# ============================================================
# Costmaps — pointcloud source (rtabmap mode, no /scan topic)
# ============================================================

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.25
      footprint_padding: 0.03
      transform_tolerance: 1.0            # depth-cam timestamps lag TF; wide window prevents message-filter drops
      plugins: ["voxel_layer", "inflation_layer"]

      # VoxelLayer (3D occupancy) replaces plain ObstacleLayer as an anti-glare
      # measure. A cell is only marked "obstacle" when >= mark_threshold voxels
      # in its vertical column are occupied. Sunlight through glass produces
      # single-voxel flicker that doesn't meet this bar, while real walls do.
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.1
        z_voxels: 10              # 0-1.0m vertical (matches height band below)
        max_obstacle_height: 1.0
        mark_threshold: 3         # need ≥3 voxels in a column → stronger sun flicker rejection
        unknown_threshold: 15
        observation_sources: pointcloud
        pointcloud:
          topic: /camera/depth/points
          data_type: "PointCloud2"
          # Height band 0.25-1.0m: skips floor IR glare + ceiling lights
          max_obstacle_height: 1.0
          min_obstacle_height: 0.40
          clearing: True
          marking: True
          raytrace_max_range: 2.5   # clearing still reaches out far so free space gets wiped
          raytrace_min_range: 0.1
          # Tightened ranges: saturated depth pixels report phantom obstacles both
          # very close (< 0.5m) and far (> 1.5m). Trust only the mid-band for marking.
          obstacle_max_range: 1.2
          obstacle_min_range: 0.5
          # Persist observations briefly so a moving obstacle that left the FOV
          # doesn't get instantly forgotten (otherwise DWB can't dodge it).
          observation_persistence: 0.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.30

      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.25
      footprint_padding: 0.03
      resolution: 0.05
      track_unknown_space: true
      transform_tolerance: 1.0            # depth-cam timestamps lag TF; wide window prevents message-filter drops
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        map_topic: /map

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: pointcloud
        pointcloud:
          topic: /camera/depth/points
          data_type: "PointCloud2"
          # Same height + range tightening as local costmap to reject sun glare
          max_obstacle_height: 1.0
          min_obstacle_height: 0.40
          clearing: True
          marking: True
          raytrace_max_range: 2.5
          raytrace_min_range: 0.1
          obstacle_max_range: 1.2
          obstacle_min_range: 0.5
          observation_persistence: 0.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.40

      always_send_full_costmap: True
