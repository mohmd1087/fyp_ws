# Nav2 Parameters for Real Robot — RTAB-Map localization mode
# Same as nav2_params_real.yaml but uses PointCloud2 from depth camera
# instead of /scan for obstacle layers (no fake laser scan needed)
# Activate with: LOCALIZATION_MODE=rtabmap ros2 launch fyp_bringup bringup_nav.launch.py mode:=nav

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    default_nav_to_pose_bt_xml: /home/muhammad/fyp_ws/src/fyp_nav2/behavior_trees/navigate_to_pose_w_smoothing.xml
    default_nav_through_poses_bt_xml: /home/muhammad/fyp_ws/src/fyp_nav2/behavior_trees/navigate_to_pose_w_smoothing.xml
    navigators: ["navigate_to_pose"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_rate_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_smooth_path_action_bt_node

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 20.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: True
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.349    # ~20°

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.18
      # Long, stable lookahead = robot tracks the path's overall direction
      # instead of chasing every small bend. Reduces useless mid-path turns.
      # Shorter lookahead = carrot stays close so replans (around dynamic
       # obstacles) don't swing the heading wildly and trigger constant
       # rotate-to-heading flips.
      lookahead_dist: 0.6
      min_lookahead_dist: 0.4
      max_lookahead_dist: 1.0
      lookahead_time: 2.0
      rotate_to_heading_angular_vel: 0.50
      # Raised from 0.4 → 0.785 (~45°) so small replan-induced heading
      # changes blend into forward motion instead of triggering a stop-and-
      # rotate. Eliminates the back-and-forth spin when re-routing around a
      # moving person.
      rotate_to_heading_min_angle: 0.785
      use_rotate_to_heading: true
      transform_tolerance: 0.2
      # Velocity-scaled lookahead = at higher speeds, look further ahead.
      # This prevents the carrot from staying too close during straight runs,
      # which is what triggers oscillating heading corrections.
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.5
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 6.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      # Regulated scaling only kicks in on truly tight curves now. Once RPP is
      # in pure-pursuit mode (heading aligned), keep it cruising — no chopping
      # speed for minor path waviness.
      regulated_linear_scaling_min_radius: 0.5
      regulated_linear_scaling_min_speed: 0.15
      max_angular_accel: 1.0
      allow_reversing: false
      max_robot_pose_search_dist: 10.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-4                    # was 1e-10 — converge to a smoother curve faster
      max_its: 1000                        # was 5000 — plenty for this map size
      do_refinement: true
      refinement_num: 3

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.50
    min_rotational_vel: 0.10
    rotational_acc_lim: 0.5

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.18, 0.0, 0.55]
    min_velocity: [-0.18, 0.0, -0.55]
    # Smoother runs as near-passthrough — firmware S-curve owns actual ramping.
    # Tight accel here causes double-ramping and seconds of idle delay before the
    # robot moves after a goal is sent.
    max_accel: [1.0, 0.0, 1.5]
    max_decel: [-1.0, 0.0, -1.5]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.01, 0.0, 0.01]
    velocity_timeout: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 15.0           # faster updates → dynamic obstacles register sooner
      publish_frequency: 8.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.30
      footprint_padding: 0.03
      plugins: ["voxel_layer", "inflation_layer"]

      # Voxel layer (replaces plain ObstacleLayer) — tracks occupancy in 3D
      # voxels and only marks an (x,y) cell as obstacle when >= mark_threshold
      # voxels in that column are occupied. Sunlight glare typically only lights
      # up one voxel shell per frame, so raising mark_threshold to 2 rejects it.
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.1
        z_voxels: 8
        max_obstacle_height: 1.0
        # Sun glare typically lights up scattered voxels that don't stack into a
        # column. Real obstacles (walls, people, furniture) produce dense vertical
        # stacks. Require ≥3 voxels in a column → strong sun-flicker rejection.
        mark_threshold: 3
        # Higher unknown_threshold = require MORE voxel evidence before declaring
        # a column as "unknown" (which would otherwise block the planner).
        unknown_threshold: 20
        observation_sources: pointcloud
        pointcloud:
          topic: /camera/depth/points
          data_type: "PointCloud2"
          max_obstacle_height: 1.0
          min_obstacle_height: 0.25
          clearing: True
          marking: True
          raytrace_max_range: 2.5
          raytrace_min_range: 0.1
          obstacle_max_range: 2.0       # was 1.5 — see further so dynamic obstacles register sooner
          obstacle_min_range: 0.3       # was 0.5 — detect close obstacles (person walking up)
          # Time-based decay so obstacles inside the camera blind zone (< ~0.3m)
          # eventually clear: when something gets too close the depth camera
          # returns no points for it, so raytracing can't clear the existing
          # mark. 1s persistence lets the mark expire on a timer if no new
          # observation reinforces it. Trade-off: real close obstacles flicker
          # every 1s, but anything outside the blind zone is still cleared via
          # raytracing the moment it's out of the way.
          observation_persistence: 1.0
          expected_update_rate: 0.5     # warn if pointcloud goes silent

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0          # steeper falloff = narrower soft-cost band
        inflation_radius: 0.25            # was 0.40 — tight buffer around the 0.33m robot

      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0           # was 5.0 — faster updates so dynamic obstacles register on global map quickly enough for re-plan to route around
      publish_frequency: 4.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.30
      footprint_padding: 0.03
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        map_topic: /map

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: pointcloud
        pointcloud:
          topic: /camera/depth/points
          data_type: "PointCloud2"
          max_obstacle_height: 1.5
          min_obstacle_height: 0.25
          clearing: True
          marking: True
          raytrace_max_range: 2.5
          raytrace_min_range: 0.1     # was 0.3 — don't clear close-in obstacle marks just because camera can't re-see them (30cm blind zone)
          obstacle_max_range: 2.0
          obstacle_min_range: 0.3

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Gentler falloff lets the planner take smoother arcs around obstacles
        # rather than tight zig-zags driven by cost cliffs.
        cost_scaling_factor: 2.5
        inflation_radius: 0.30

      always_send_full_costmap: True
