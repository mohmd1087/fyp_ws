amcl:
  ros__parameters:
    use_sim_time: true
    # Motion model noise - trust odom less due to skid-steer slip
    alpha1: 0.1   # rotation from rotation
    alpha2: 0.1   # rotation from translation
    alpha3: 0.1   # translation from translation
    alpha4: 0.1   # translation from rotation
    alpha5: 0.1   # translation from rotation (omnidirectional)
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: "/scan"
    tf_broadcast: true
    # Increased particles for coarse map - helps convergence
    max_particles: 5000
    min_particles: 2000
    # More frequent updates for better tracking
    update_min_a: 0.05   # update every 0.05 rad rotation
    update_min_d: 0.05   # update every 5cm translation
    resample_interval: 1  # resample every update
    laser_model_type: "likelihood_field"
    laser_max_range: 6.0
    laser_min_range: 0.2
    # Laser likelihood field params - wider sigma for coarse map
    sigma_hit: 0.3        # wider matching tolerance for 0.5m map
    z_hit: 0.9
    z_rand: 0.1
    # Recovery behavior
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1
    set_initial_pose: true
    initial_pose:
      x: 16.0
      y: 1.5
      z: 0.0
      yaw: 3.1416

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""  # overridden by launch

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.25
      use_astar: true              # Use A* algorithm (instead of Dijkstra)
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0001
    min_theta_velocity_threshold: 0.001

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.25
      stateful: true

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      # Enable debug output for trajectory visualization in RViz
      debug_trajectory_details: true
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.3               # Reduced for stability
      max_vel_y: 0.0
      max_vel_theta: 0.5           # Reduced to prevent oversteering
      min_speed_xy: 0.0
      max_speed_xy: 0.3
      min_speed_theta: 0.0
      acc_lim_x: 0.5               # Gentle acceleration
      acc_lim_y: 0.0
      acc_lim_theta: 0.5           # Gentle turning
      decel_lim_x: -0.5
      decel_lim_y: 0.0
      decel_lim_theta: -0.5
      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.20
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      # Critics for navigation with obstacle avoidance
      critics: ["BaseObstacle", "ObstacleFootprint", "PathAlign", "PathDist", "GoalDist", "RotateToGoal"]
      # Obstacle avoidance - HIGHEST priority to avoid walls
      BaseObstacle.scale: 5.0
      ObstacleFootprint.scale: 3.0
      # Path tracking - lower priority than obstacles
      PathAlign.scale: 24.0
      PathAlign.forward_point_distance: 0.3
      PathDist.scale: 20.0
      GoalDist.scale: 15.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered    # Use EKF-fused odometry
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - map_server
      - amcl
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 0.5
      robot_radius: 0.20
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          # sensor_frame removed - uses frame_id from /scan header (camera_link)
          data_type: LaserScan
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.2
          raytrace_max_range: 7.0
          raytrace_min_range: 0.0
          inf_is_valid: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Larger inflation for better obstacle avoidance
        cost_scaling_factor: 5.0
        inflation_radius: 0.7

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      update_frequency: 1.0
      publish_frequency: 1.0
      transform_tolerance: 0.5
      robot_radius: 0.20
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        unknown_cost_value: 255
        lethal_cost_threshold: 100
        track_unknown_space: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.7
